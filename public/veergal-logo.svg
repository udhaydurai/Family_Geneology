<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6d28d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trunkGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="leafGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9a8d4;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="rootGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e1b4b" flood-opacity="0.3" />
    </filter>
  </defs>

  <circle cx="256" cy="256" r="248" fill="url(#bgGrad)" />
  <circle cx="256" cy="256" r="248" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.4" />
  <circle cx="256" cy="256" r="230" fill="none" stroke="#c4b5fd" stroke-width="0.5" opacity="0.3" />

  <g opacity="0.55" filter="url(#glow)">
    <path d="M256 310 Q256 370 256 410 Q256 430 248 450" fill="none" stroke="url(#rootGrad)" stroke-width="3.5" stroke-linecap="round" />
    <path d="M256 310 Q240 360 218 400 Q200 430 180 448" fill="none" stroke="url(#rootGrad)" stroke-width="3" stroke-linecap="round" />
    <path d="M256 310 Q230 350 195 380 Q165 405 142 418" fill="none" stroke="url(#rootGrad)" stroke-width="2.5" stroke-linecap="round" />
    <path d="M256 310 Q222 340 178 358 Q148 372 120 378" fill="none" stroke="url(#rootGrad)" stroke-width="2" stroke-linecap="round" />
    <path d="M256 310 Q272 360 294 400 Q312 430 332 448" fill="none" stroke="url(#rootGrad)" stroke-width="3" stroke-linecap="round" />
    <path d="M256 310 Q282 350 317 380 Q347 405 370 418" fill="none" stroke="url(#rootGrad)" stroke-width="2.5" stroke-linecap="round" />
    <path d="M256 310 Q290 340 334 358 Q364 372 392 378" fill="none" stroke="url(#rootGrad)" stroke-width="2" stroke-linecap="round" />
    <circle cx="248" cy="450" r="2.5" fill="#c4b5fd" opacity="0.4" />
    <circle cx="180" cy="448" r="2.5" fill="#c4b5fd" opacity="0.4" />
    <circle cx="142" cy="418" r="2.5" fill="#c4b5fd" opacity="0.4" />
    <circle cx="120" cy="378" r="2.5" fill="#c4b5fd" opacity="0.4" />
    <circle cx="332" cy="448" r="2.5" fill="#c4b5fd" opacity="0.4" />
    <circle cx="370" cy="418" r="2.5" fill="#c4b5fd" opacity="0.4" />
    <circle cx="392" cy="378" r="2.5" fill="#c4b5fd" opacity="0.4" />
  </g>

  <path d="M256 310 Q256 270 256 240 Q254 220 252 200" fill="none" stroke="url(#trunkGrad)" stroke-width="6" stroke-linecap="round" filter="url(#softShadow)" />

  <g filter="url(#softShadow)">
    <path d="M254 230 Q230 200 200 180" fill="none" stroke="url(#trunkGrad)" stroke-width="4" stroke-linecap="round" />
    <path d="M254 210 Q220 185 185 160" fill="none" stroke="url(#trunkGrad)" stroke-width="3.5" stroke-linecap="round" />
    <path d="M254 245 Q225 230 195 225" fill="none" stroke="url(#trunkGrad)" stroke-width="3" stroke-linecap="round" />
    <path d="M258 230 Q282 200 312 180" fill="none" stroke="url(#trunkGrad)" stroke-width="4" stroke-linecap="round" />
    <path d="M258 210 Q292 185 327 160" fill="none" stroke="url(#trunkGrad)" stroke-width="3.5" stroke-linecap="round" />
    <path d="M258 245 Q287 230 317 225" fill="none" stroke="url(#trunkGrad)" stroke-width="3" stroke-linecap="round" />
    <path d="M254 200 Q240 165 225 140" fill="none" stroke="url(#trunkGrad)" stroke-width="3" stroke-linecap="round" />
    <path d="M258 200 Q272 165 287 140" fill="none" stroke="url(#trunkGrad)" stroke-width="3" stroke-linecap="round" />
  </g>

  <g filter="url(#glow)">
    <circle cx="200" cy="175" r="14" fill="url(#leafGrad1)" />
    <circle cx="185" cy="155" r="11" fill="url(#leafGrad1)" />
    <circle cx="225" cy="135" r="12" fill="url(#leafGrad1)" />
    <circle cx="195" cy="220" r="10" fill="url(#leafGrad1)" />
    <circle cx="312" cy="175" r="14" fill="url(#leafGrad1)" />
    <circle cx="287" cy="135" r="12" fill="url(#leafGrad1)" />
  </g>

  <g filter="url(#glow)">
    <circle cx="327" cy="155" r="11" fill="url(#leafGrad2)" />
    <circle cx="317" cy="220" r="10" fill="url(#leafGrad2)" />
    <circle cx="165" cy="140" r="9" fill="url(#leafGrad2)" />
    <circle cx="340" cy="135" r="9" fill="url(#leafGrad2)" />
  </g>

  <circle cx="256" cy="195" r="16" fill="white" opacity="0.95" filter="url(#softShadow)" />
  <circle cx="256" cy="195" r="11" fill="url(#bgGrad)" opacity="0.8" />
  <circle cx="256" cy="195" r="5" fill="white" opacity="0.9" />

  <text x="256" y="340" text-anchor="middle" font-family="'Noto Sans Tamil', 'Latha', 'Vijaya', sans-serif" font-size="38" font-weight="700" fill="white" filter="url(#softShadow)" letter-spacing="2">வேர்கள்</text>
  <text x="256" y="370" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#c4b5fd" letter-spacing="5" font-weight="300">ROOTS</text>
</svg>
